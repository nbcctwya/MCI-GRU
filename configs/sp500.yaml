# MCI-GRU baseline config — S&P 500 (US, qlib US data).
# Hyperparameters mirror the original code/sp500.py defaults
# (5 features — the original already drops turnover — hidden=256, epochs=5).
market: sp500
region: us
provider_uri: "~/.qlib/qlib_data/us_data"
benchmark: "^gspc"

universe:
  start: "2009-01-01"
  end: "2025-12-31"
  presence_threshold: 0.95
  max_instruments: null

splits:
  train: {start: "2009-01-01", end: "2020-12-31"}
  valid: {start: "2021-01-01", end: "2022-12-31"}
  test:  {start: "2023-01-01", end: "2025-12-31"}

# Original SP500 uses 5 features (no turnover) — matches US having no turnover.
features: [close, open, high, low, volume]
turnover_mode: none

graph:
  judge_value: 0.8
  corr_window_days: 250

model:
  hidden: 256
  hidden_size_gat1: 5
  output_gat1: 256
  gat_out_channels: 4
  gat_heads: 4
  hidden_size_gat2: 5
  embed_dim: 256
  num_hidden_states: 4
  his_t: 10
  label_t: 5
  lr: 0.001
  loss: mse

train:
  num_seeds: 5
  seeds: [0, 1, 2, 3, 4]
  num_epochs: 5
  select_metric: valid_rankic
  device: auto

backtest:
  account: 1.0e+8
  topk: 30
  n_drop: 5
  open_cost: 0.0005
  close_cost: 0.0015
  min_cost: 5
  deal_price: close
  limit_threshold: null       # US has no daily price limit

output_dir: sp500
